# Template: Ticket Details
# Generated by: scripts/fetch-ticket.sh
# Location: tickets/{ticket_id}/ticket-details.yaml
#
# This file contains structured ticket information fetched from Jira.
# The 'extracted' section is best-effort automatic extraction from description + comments.

ticket_id: "{ticket_id}"
summary: "{summary}"
status: "{status}"
priority: "{priority}"
created: "{created_date}"
resolved: "{resolved_date}"  # null if unresolved

description: |
  {raw_description_from_jira}

comments:
  - author: "{comment_author}"
    date: "{comment_date}"
    body: |
      {comment_body}

labels: []       # Jira labels, if any
attachments: []  # List of attachment filenames

additional_context: "{optional_context_from_cli_flag}"  # From --context flag, null if not provided

# Auto-extracted identifiers (best-effort extraction from description + comments)
extracted:
  identifiers: {}             # Populated dynamically from config.yaml identifiers
  dates_mentioned: []         # e.g., ["2026-01-27"]
  endpoints_mentioned: []     # e.g., ["/api/resource/create"]
  error_messages: []          # Key error text found in ticket
  service_area_guess: "{module_name}"  # Module name from config.yaml modules

# Knowledge Center pattern match (populated by /fetch-ticket, consumed by downstream skills)
# This avoids downstream skills having to re-read and scan the full issues.yaml
kc_match:
  pattern_id: null            # e.g., "service-request-failure", null if no match
  confidence: null            # "high", "medium", "low", or null
  title: null                 # Human-readable pattern title
  category: null              # e.g., "external_integration_issue"
  service_area: null          # e.g., module name from config.yaml
  external_service: null      # e.g., integration name from config.yaml, null if not applicable
  log_signatures:
    required: []              # e.g., [{tag: "SERVICE_CALL_FAILED", channel: "integration_client"}]
    supporting: []            # e.g., [{tag: "EXTERNAL_API_TIMEOUT", channel: "http_client"}]
  resolution:
    action: null              # e.g., "external_integration_response"
    recipient: null           # e.g., "integration_team"
    response_template: null   # Key points for the response, or null
  data_queries_needed: false  # Whether production data is recommended
